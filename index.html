<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careflick Care Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [users, setUsers] = useState([]);
            const [search, setSearch] = useState('');
            const [tab, setTab] = useState('users');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch('https://jsonplaceholder.typicode.com/users')
                    .then(res => res.json())
                    .then(data => {
                        setUsers(data);
                        setLoading(false);
                    });
            }, []);

            const filteredUsers = users.filter(u => 
                u.name.toLowerCase().includes(search.toLowerCase()) || 
                u.email.toLowerCase().includes(search.toLowerCase())
            );

            if (loading) return <div className="p-20 text-center font-bold text-blue-600">Loading Dashboard...</div>;

            return (
                <div className="min-h-screen">
                    <nav className="bg-white shadow-md p-4 flex justify-center gap-6 sticky top-0 z-10">
                        <button onClick={() => setTab('users')} className={`px-6 py-2 rounded-full font-semibold ${tab === 'users' ? 'bg-blue-600 text-white' : 'text-gray-600'}`}>Users</button>
                        <button onClick={() => setTab('forms')} className={`px-6 py-2 rounded-full font-semibold ${tab === 'forms' ? 'bg-blue-600 text-white' : 'text-gray-600'}`}>Care Forms</button>
                    </nav>

                    <div className="p-6 max-w-5xl mx-auto">
                        {tab === 'users' ? (
                            <div>
                                <input 
                                    type="text" 
                                    placeholder="Search users..." 
                                    className="w-full p-3 mb-6 border rounded-lg shadow-sm outline-none focus:ring-2 focus:ring-blue-400"
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {filteredUsers.map(u => (
                                        <div key={u.id} className="bg-white p-5 rounded-xl shadow border hover:border-blue-500 transition">
                                            <h3 className="font-bold text-lg">{u.name}</h3>
                                            <p className="text-gray-600">{u.email}</p>
                                            <p className="text-gray-400 text-sm mt-2">{u.phone}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-xl shadow-lg max-w-md mx-auto border border-blue-100">
                                <h2 className="text-2xl font-bold mb-6 text-gray-800">Submit Care Form</h2>
                                <label className="block text-sm font-medium mb-2">Select Patient</label>
                                <select className="w-full p-3 border rounded-lg mb-4 bg-gray-50">
                                    {users.map(u => <option key={u.id}>{u.name}</option>)}
                                </select>
                                <label className="block text-sm font-medium mb-2">Form Type</label>
                                <select className="w-full p-3 border rounded-lg mb-6 bg-gray-50">
                                    <option>Health Check-up</option>
                                    <option>Medication History</option>
                                </select>
                                <button className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700">Submit to Careflick</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
